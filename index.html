        #resultContent h1,#resultContent h2,#resultContent h3,#resultContent h4 { color: #34d399; margin-top: 1.25rem; margin-bottom: 0.5rem; }
        #resultContent p { color: #d1d5db; margin-bottom: 0.75rem; line-height: 1.6; }
        #resultContent ul,#resultContent ol { color: #d1d5db; padding-left: 1.5rem; margin-bottom: 0.75rem; }
        #resultContent li { margin-bottom: 0.25rem; }

<body class="min-h-screen text-gray-100">

<!-- ===== APP CONTAINER ===== -->
<div id="app"></div>

<!-- ===== ADMIN BYPASS MODAL ===== -->
<div id="adminBypassModal" class="hidden fixed inset-0 z-[9999] bg-black/70 backdrop-blur-sm flex items-center justify-center p-4">
  <div class="w-full max-w-sm rounded-3xl border border-gray-800 bg-[#111827] p-6 shadow-2xl space-y-4">
    <h2 class="text-xl font-black text-gray-100">Admin Access</h2>
    <input id="adminBypassName" class="w-full rounded-xl border border-gray-700 bg-[#0b0e14] px-4 py-3 text-gray-100 placeholder-gray-500 outline-none focus:border-emerald-500 text-sm" placeholder="Nama">
    <input id="adminBypassPassword" type="password" class="w-full rounded-xl border border-gray-700 bg-[#0b0e14] px-4 py-3 text-gray-100 placeholder-gray-500 outline-none focus:border-emerald-500 text-sm" placeholder="Password">
    <p id="adminBypassError" class="hidden text-sm text-red-400">Akses admin salah.</p>
    <button id="adminBypassLoginBtn" class="w-full rounded-xl bg-emerald-500 px-5 py-3 text-sm font-black text-black hover:bg-emerald-400 transition">Masuk Admin</button>

  </div>
</div>

<!-- ===== ADMIN AI DETAIL MODAL ===== -->
<div id="adminAiModal" class="hidden fixed inset-0 z-[9999] bg-black/70 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="w-full max-w-5xl max-h-[85vh] overflow-y-auto rounded-2xl border border-gray-800 bg-[#111827] p-4 sm:p-6 shadow-2xl">
        <div class="flex items-center justify-between mb-4">
            <div>
                <h3 class="text-base font-bold text-white">Hasil Analisis AI</h3>
                <p id="adminAiModalSubtitle" class="text-xs text-gray-400 mt-0.5"></p>
            </div>
            <button onclick="closeAdminAiModal()" class="rounded-xl bg-gray-800 px-3 py-2 text-sm font-bold text-gray-100 hover:bg-gray-700 transition">Tutup</button>
        </div>
        <div id="adminAiResultDetail" class="mt-4 space-y-4 overflow-x-auto"></div>
    </div>
</div>

<script>
// ============================================================
// PART A: MAINTENANCE SYSTEM
// ============================================================

// ===== WIB TIME FUNCTIONS =====
function getWIBHour() {
  var parts = new Intl.DateTimeFormat("en-US", {
    timeZone: "Asia/Jakarta",
    hour: "2-digit",
    hour12: false
  }).formatToParts(new Date());
  var hourPart = parts.find(function(part) { return part.type === "hour"; });
  return Number(hourPart ? hourPart.value : "0");
}

function isMaintenanceTime() {
  var hour = getWIBHour();
  return hour >= 22 || hour < 6;
}

function isAdminUser() {
  var name = (localStorage.getItem("autocuan_user") || "").trim().toLowerCase();
  var adminFlag = localStorage.getItem("autocuan_is_admin") === "true";
  return adminFlag && name === "budi";
}

// ============================================================
// PART B: USERNAME SAFETY FILTER & 2-HOUR DEVICE BLOCK
// ============================================================

function getBlockedUntil() {
  return Number(localStorage.getItem("autocuan_blocked_until") || "0");
}

function isDeviceBlocked() {
  var blockedUntil = getBlockedUntil();
  return blockedUntil > 0 && Date.now() < blockedUntil;
}

function normalizeNameForCheck(name) {
  return (name || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9\s._-]/g, "");
}

function isBadUsername(name) {
  var raw = name || "";
  var clean = normalizeNameForCheck(raw);

  if (clean.length < 2) return true;
  if (clean.length > 30) return true;

  // repeated character spam
  if (/(.)\1{5,}/.test(clean)) return true;

  // urls/spam
  if (/(http|www\.|\.com|\.net|\.org|\.id)/i.test(clean)) return true;

  var bannedWords = [
    // animal/abusive
    "anjing", "babi", "monyet", "bangsat", "kampret", "goblok", "tolol", "idiot",
    "bajingan", "brengsek", "keparat", "sialan", "bedebah", "kunyuk", "asu",
    // supernatural/weird fake
    "alien", "ufo", "iblis", "setan", "dajjal", "tuyul", "pocong", "kuntilanak", "genderuwo", "siluman",
    // porn/sexual/vulgar
    "porno", "porn", "sex", "seks", "bokep", "mesum", "ngentot", "kontol", "memek", "pepek", "titit",
    "ngewe", "colmek", "coli", "jilmek", "toket",
    // hate/sara/religion insult
    "kafirhina", "hinaagama", "antiagama"
  ];

  return bannedWords.some(function(word) { return clean.includes(word); });
}

function blockDeviceForBadName() {
  var blockedUntil = Date.now() + (2 * 60 * 60 * 1000);
  localStorage.setItem("autocuan_blocked_until", String(blockedUntil));
  console.log("[AutoCuan] Bad username block triggered");

  try {
    if (typeof logUsage === "function") {
      logUsage("", "username_blocked");
    }
  } catch (e) {}

  showBlockedScreen();
}

// ============================================================
// MOBILE SECRET ADMIN ACCESS (5 taps)
// ============================================================

var maintenanceTapCount = 0;
var maintenanceTapTimer = null;

function openAdminBypassModal() {
  console.log("[AutoCuan] Admin bypass modal opened");
  var modal = document.getElementById("adminBypassModal");
  if (modal) {
    modal.classList.remove("hidden");
    var nameInput = document.getElementById("adminBypassName");
    var passInput = document.getElementById("adminBypassPassword");
    var errorEl = document.getElementById("adminBypassError");
    if (nameInput) nameInput.value = "";
    if (passInput) passInput.value = "";
    if (errorEl) errorEl.classList.add("hidden");
    if (nameInput) nameInput.focus();
  }
}

function handleMaintenanceSecretTap() {
  console.log("[AutoCuan] Maintenance logo tapped");

  maintenanceTapCount += 1;

  if (!maintenanceTapTimer) {
    maintenanceTapTimer = setTimeout(function() {
      maintenanceTapCount = 0;
      maintenanceTapTimer = null;
    }, 3000);
  }

  if (maintenanceTapCount >= 5) {
    maintenanceTapCount = 0;

    if (maintenanceTapTimer) {
      clearTimeout(maintenanceTapTimer);
      maintenanceTapTimer = null;
    }

    openAdminBypassModal();
  }
}

function bindMaintenanceSecretTap() {
  var logo = document.getElementById("maintenanceSecretLogo");

  if (!logo) {
    console.warn("[AutoCuan] maintenanceSecretLogo not found");
    return;
  }

  console.log("[AutoCuan] maintenanceSecretLogo found and bound");
  logo.removeEventListener("click", handleMaintenanceSecretTap);
  logo.addEventListener("click", handleMaintenanceSecretTap);
}

// ============================================================
// DESKTOP SECRET ADMIN SHORTCUT (Ctrl + B + K)
// ============================================================

var adminShortcutStep = 0;
document.addEventListener("keydown", function(e) {
  if (e.ctrlKey && e.key.toLowerCase() === "b") {
    adminShortcutStep = 1;
    e.preventDefault();
    return;
  }
  if (adminShortcutStep === 1 && e.key.toLowerCase() === "k") {
    adminShortcutStep = 0;
    e.preventDefault();
    openAdminBypassModal();
    return;
  }
  if (!e.ctrlKey) {
    adminShortcutStep = 0;
  }
});

// ============================================================
// ADMIN BYPASS MODAL VALIDATION
// ============================================================

function bindAdminBypassModal() {
  var loginBtn = document.getElementById("adminBypassLoginBtn");
  var cancelBtn = document.getElementById("adminBypassCancelBtn");
  var modal = document.getElementById("adminBypassModal");

  if (cancelBtn) {
    cancelBtn.onclick = function() { modal && modal.classList.add("hidden"); };
  }

  if (loginBtn) {
    loginBtn.onclick = function() {
      var name = document.getElementById("adminBypassName") ? document.getElementById("adminBypassName").value : "";
      var password = document.getElementById("adminBypassPassword") ? document.getElementById("adminBypassPassword").value : "";
      var error = document.getElementById("adminBypassError");

      var cleanName = name.trim().toLowerCase();

      if (cleanName === "budi" && password === ".") {
        localStorage.setItem("autocuan_user", name.trim() || "budi");
        localStorage.setItem("autocuan_is_admin", "true");
        localStorage.setItem("autocuan_login_time", Date.now().toString());

        try {
          logLogin(name.trim() || "budi", false, true);
        } catch (e) {}

        location.reload();
      } else {
        if (error) error.classList.remove("hidden");
      }
    };
  }
}

// Bind admin bypass modal on load
bindAdminBypassModal();

// ============================================================
// SCREEN RENDERERS
// ============================================================

function showMaintenanceScreen() {
  console.log("[AutoCuan] Maintenance screen rendered");
  var app = document.getElementById("app");
  app.innerHTML = '<div class="min-h-screen w-full flex items-center justify-center px-4 bg-[#0b0e14] text-gray-100">' +
    '<div class="w-full max-w-md rounded-3xl border border-yellow-500/30 bg-[#111827]/95 p-6 sm:p-8 shadow-2xl text-center space-y-5">' +
      '<div id="maintenanceSecretLogo" class="mx-auto flex h-16 w-16 cursor-pointer items-center justify-center rounded-2xl bg-yellow-500/10 text-4xl select-none">&#x1F6E0;&#xFE0F;</div>' +
      '<h2 class="text-xl font-bold text-white">Website sedang maintenance</h2>' +
      '<p class="text-sm text-yellow-300">Auto-Cuan sedang tidak dapat diakses pada pukul 22:00\u201306:00 WIB.</p>' +
      '<p class="text-sm text-gray-300">Silakan kembali lagi setelah pukul 06:00 WIB.</p>' +
    '</div>' +
  '</div>';

  bindMaintenanceSecretTap();
  bindAdminBypassModal();
}

function showBlockedScreen() {
  console.log("[AutoCuan] Blocked screen rendered");
  var app = document.getElementById("app");
  var blockedUntil = getBlockedUntil();

  app.innerHTML = '<div class="min-h-screen w-full flex items-center justify-center px-4 bg-[#0b0e14] text-gray-100">' +
    '<div class="w-full max-w-md rounded-3xl border border-red-500/30 bg-[#111827]/95 p-6 sm:p-8 shadow-2xl text-center space-y-5">' +
      '<div id="maintenanceSecretLogo" class="mx-auto flex h-16 w-16 cursor-pointer items-center justify-center rounded-2xl bg-red-500/10 text-4xl select-none">&#x1F6AB;</div>' +
      '<h2 class="text-xl font-bold text-white">Akses diblokir sementara</h2>' +
      '<p class="text-sm text-red-300">Nama yang digunakan tidak sesuai ketentuan. Silakan coba lagi setelah beberapa waktu.</p>' +
      '<p id="blockedCountdown" class="text-sm text-gray-400 font-mono"></p>' +
    '</div>' +
  '</div>';

  bindMaintenanceSecretTap();
  bindAdminBypassModal();

  // Start countdown
  var countdownEl = document.getElementById("blockedCountdown");
  function updateCountdown() {
    var now = Date.now();
    var remaining = blockedUntil - now;
    if (remaining <= 0) {
      localStorage.removeItem("autocuan_blocked_until");
      location.reload();
      return;
    }
    var minutes = Math.floor(remaining / 60000);
    var seconds = Math.floor((remaining % 60000) / 1000);
    if (countdownEl) {
      countdownEl.textContent = "Akses dibuka kembali dalam: " + minutes + " menit " + (seconds < 10 ? "0" : "") + seconds + " detik";
    }
  }
  updateCountdown();
  setInterval(updateCountdown, 1000);
}

function showLoginScreen() {
  var app = document.getElementById("app");
  app.innerHTML = '<div id="loginScreen" class="min-h-screen flex items-center justify-center px-4">' +
    '<div class="w-full max-w-sm fade-in-up">' +
      '<div class="text-center mb-8">' +
        '<div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-emerald-500 to-emerald-600 flex items-center justify-center shadow-lg">' +
          '<svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>' +
        '</div>' +
        '<h1 class="text-2xl font-bold text-white">Auto-Cuan</h1>' +
        '<p class="text-sm text-gray-400 mt-1">SMC Analysis Platform</p>' +
      '</div>' +
      '<div class="bg-dark-800/60 border border-dark-600/50 rounded-2xl p-6 backdrop-blur-sm">' +
        '<div class="space-y-4">' +
          '<div><label class="block text-sm font-medium text-gray-400 mb-1.5">Username</label>' +
          '<input type="text" id="loginUsername" placeholder="Masukkan username" class="w-full px-4 py-3 rounded-xl bg-dark-700 border border-dark-600/50 text-gray-100 placeholder-gray-500 focus:outline-none focus:border-emerald-500/50 focus:ring-1 focus:ring-emerald-500/30 transition-all text-sm"></div>' +
          '<div><label class="block text-sm font-medium text-gray-400 mb-1.5">Password</label>' +
          '<input type="password" id="loginPassword" placeholder="Masukkan password" class="w-full px-4 py-3 rounded-xl bg-dark-700 border border-dark-600/50 text-gray-100 placeholder-gray-500 focus:outline-none focus:border-emerald-500/50 focus:ring-1 focus:ring-emerald-500/30 transition-all text-sm" onkeydown="if(event.key===\'Enter\')doLogin()"></div>' +
          '<div id="loginError" class="hidden text-sm text-red-400 text-center py-1"></div>' +
          '<button onclick="doLogin()" class="w-full py-3 rounded-xl font-semibold text-white bg-gradient-to-r from-emerald-600 to-emerald-500 glow-emerald hover:scale-[1.02] active:scale-[0.98] transition-all duration-200">Masuk</button>' +
          '<button onclick="guestLogin()" class="w-full py-3 rounded-xl font-medium text-gray-400 border border-dark-600/50 hover:border-emerald-500/30 hover:text-emerald-400 transition-all duration-200">Coba Tanpa Login</button>' +
        '</div>' +
      '</div>' +
    '</div>' +
  '</div>';
}
</script>
</body>
</html>

<script>
// ============================================================
// LOGGING FUNCTIONS
// ============================================================

async function logLogin(username, isGuest, isAdmin) {
    try {
        await fetch('/api/log-login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: username, isGuest: isGuest, isAdmin: isAdmin, userAgent: navigator.userAgent })
        });
    } catch (e) { console.warn('logLogin failed', e); }
}

async function logSearch(ticker, source) {
    try {
        var username = localStorage.getItem('autocuan_user') || 'Unknown';
        await fetch('/api/log-search', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: username, ticker: ticker, source: source })
        });
    } catch (e) { console.warn('logSearch failed', e); }
}

async function logAnalysisResult(ticker, mode, html) {
    try {
        var username = localStorage.getItem('autocuan_user') || 'Unknown';
        var text = String(html || '').replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
        var resultSummary = text.slice(0, 500);
        await fetch('/api/log-analysis', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: username, ticker: ticker, mode: mode, resultSummary: resultSummary, fullResultHtml: html })
        });
    } catch (e) { console.warn('logAnalysis failed', e); }
}

async function logUsage(ticker, action) {
    try {
        var username = localStorage.getItem('autocuan_user') || 'Unknown';
        await fetch('/api/log-usage', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: username, ticker: ticker, action: action })
        });
    } catch (e) { console.warn('logUsage failed', e); }
}

// ============================================================
// LOGIN LOGIC
// ============================================================

function doLogin() {
    var usernameInput = document.getElementById('loginUsername').value.trim();
    var password = document.getElementById('loginPassword').value;
    var errorEl = document.getElementById('loginError');

    if (!usernameInput) {
        errorEl.textContent = 'Username tidak boleh kosong.';
        errorEl.classList.remove('hidden');
        return;
    }

    var usernameLower = usernameInput.toLowerCase();

    // Admin budi bypass - never block budi
    if (usernameLower === 'budi') {
        if (password === '.') {
            localStorage.setItem('autocuan_user', 'budi');
            localStorage.setItem('autocuan_is_admin', 'true');
            localStorage.setItem('autocuan_login_time', Date.now().toString());
            logLogin('budi', false, true);
            showDashboard('budi');
        } else {
            errorEl.textContent = 'Password salah.';
            errorEl.classList.remove('hidden');
        }
        return;
    }

    // Username safety filter - check BEFORE password
    if (isBadUsername(usernameInput)) {
        console.log("[AutoCuan] Bad username block triggered on login");
        blockDeviceForBadName();
        return;
    }

    // Normal user password validation
    var firstChar = usernameLower.charAt(0);
    var expectedPass = (firstChar.charCodeAt(0) - 96).toString();
    if (password === expectedPass) {
        localStorage.setItem('autocuan_user', usernameLower);
        localStorage.setItem('autocuan_is_admin', 'false');
        localStorage.setItem('autocuan_login_time', Date.now().toString());
        logLogin(usernameLower, false, false);
        showDashboard(usernameLower);
    } else {
        errorEl.textContent = 'Password salah. Hint: posisi huruf pertama di alfabet.';
        errorEl.classList.remove('hidden');
    }
}

function guestLogin() {
    // If device is blocked, guest cannot enter
    if (isDeviceBlocked()) {
        showBlockedScreen();
        return;
    }
    localStorage.setItem('autocuan_user', 'guest');
    localStorage.setItem('autocuan_is_admin', 'false');
    logLogin('Guest', true, false);
    showDashboard('guest');
}

function logout() {
    localStorage.removeItem('autocuan_user');
    localStorage.removeItem('autocuan_is_admin');
    localStorage.removeItem('autocuan_login_time');
    initApp();
}

// ============================================================
// DASHBOARD
// ============================================================

function showDashboard(username) {
    var app = document.getElementById('app');
    var template = document.getElementById('dashboardTemplate');
    app.innerHTML = template.innerHTML;

    document.getElementById('headerUsername').textContent = username;

    var isAdmin = localStorage.getItem('autocuan_is_admin') === 'true';
    var isGuest = (username === 'guest');

    if (isGuest) {
        document.getElementById('guestBanner').classList.remove('hidden');
        document.getElementById('aiSection').classList.add('hidden');
        document.getElementById('adminPanel').classList.add('hidden');
    } else {
        document.getElementById('guestBanner').classList.add('hidden');
        document.getElementById('aiSection').classList.remove('hidden');
        if (isAdmin) {
            document.getElementById('adminPanel').classList.remove('hidden');
        } else {
            document.getElementById('adminPanel').classList.add('hidden');
        }
    }

    loadTradingView();
}

// ============================================================
// TRADINGVIEW
// ============================================================

function loadTradingView() {
    var container = document.getElementById('tvChartContainer');
    if (!container) return;
    if (container.querySelector('iframe') || container.querySelector('script')) return;
    var script = document.createElement('script');
    script.type = 'text/javascript';
    script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
    script.async = true;
    script.innerHTML = JSON.stringify({
        "autosize": true, "symbol": "IDX:IHSG", "interval": "D",
        "timezone": "Asia/Jakarta", "theme": "dark", "style": "1", "locale": "id",
        "backgroundColor": "rgba(15, 19, 25, 1)", "gridColor": "rgba(28, 35, 51, 0.5)",
        "allow_symbol_change": true, "calendar": false, "support_host": "https://www.tradingview.com"
    });
    var widget = document.createElement('div');
    widget.className = 'tradingview-widget-container';
    widget.style.height = '100%';
    widget.style.width = '100%';
    var widgetInner = document.createElement('div');
    widgetInner.className = 'tradingview-widget-container__widget';
    widgetInner.style.height = '100%';
    widgetInner.style.width = '100%';
    widget.appendChild(widgetInner);
    widget.appendChild(script);
    container.appendChild(widget);
}

// ============================================================
// AI ANALYSIS
// ============================================================

function getUsageRecords() {
    try {
        var records = JSON.parse(localStorage.getItem('autocuan_usage') || '[]');
        var now = Date.now();
        return records.filter(function(t) { return (now - t) < 30 * 60 * 1000; });
    } catch(e) { return []; }
}

function addUsageRecord() {
    var records = getUsageRecords();
    records.push(Date.now());
    localStorage.setItem('autocuan_usage', JSON.stringify(records));
}

function checkUsageLimit() {
    var isAdmin = localStorage.getItem('autocuan_is_admin') === 'true';
    if (isAdmin) return true;
    var records = getUsageRecords();
    return records.length < 2;
}

async function analyzeChart() {
    var ticker = document.getElementById('tickerInput').value.trim().toUpperCase();
    var currentPrice = document.getElementById('priceInput').value.trim();
    var limitWarning = document.getElementById('limitWarning');

    if (!ticker) { alert('Masukkan ticker saham.'); return; }
    if (!currentPrice) { alert('Masukkan harga sekarang.'); return; }

    if (!checkUsageLimit()) {
        limitWarning.textContent = 'Batas analisis tercapai (2x/30 menit). Tunggu beberapa menit.';
        limitWarning.classList.remove('hidden');
        logUsage(ticker, 'ai_limit_blocked');
        return;
    }
    limitWarning.classList.add('hidden');

    logSearch(ticker, 'ticker_mode');
    logUsage(ticker, 'ai_analysis_started');

    document.getElementById('loadingState').classList.remove('hidden');
    document.getElementById('resultSection').classList.add('hidden');
    document.getElementById('analyzeBtn').disabled = true;

    try {
        var response = await fetch('/api/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ticker: ticker, currentPrice: parseFloat(currentPrice), username: localStorage.getItem('autocuan_user') || '', isAdmin: localStorage.getItem('autocuan_is_admin') === 'true' })
        });

        var data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Terjadi kesalahan pada server.');

        if (data.html) {
            var html = data.html;
            html = html.replace(/^```html\s*/i, '').replace(/```\s*$/i, '');
            document.getElementById('resultContent').innerHTML = html;
            document.getElementById('resultSection').classList.remove('hidden');
            document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
            addUsageRecord();
            logUsage(ticker, 'ai_success');
            logAnalysisResult(ticker, 'ticker', html);
        } else {
            throw new Error('Tidak ada hasil analisis dari AI.');
        }
    } catch(error) {
        logUsage(ticker, 'ai_error');
        document.getElementById('resultContent').innerHTML = '<div class="bg-red-500/10 border border-red-500/30 rounded-xl p-6 text-center"><p class="text-red-400 font-semibold mb-2">Gagal Menganalisis</p><p class="text-red-300/70 text-sm">' + error.message + '</p><button onclick="analyzeChart()" class="mt-4 px-4 py-2 rounded-lg bg-red-500/20 text-red-300 text-sm hover:bg-red-500/30 transition-colors">Coba Lagi</button></div>';
        document.getElementById('resultSection').classList.remove('hidden');
    } finally {
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('analyzeBtn').disabled = false;
    }
}

// ============================================================
// CHART UPLOAD
// ============================================================

var selectedChartFile = null;

function handleChartFile(event) {
    var file = event.target.files[0];
    if (!file) return;
    var validTypes = ['image/png', 'image/jpeg', 'image/jpg', 'image/webp'];
    if (!validTypes.includes(file.type)) { alert('Format file tidak didukung.'); return; }
    if (file.size > 20 * 1024 * 1024) { alert('Ukuran file terlalu besar. Maksimal 20MB.'); return; }
    selectedChartFile = file;
    var preview = document.getElementById('chartPreviewImage');
    preview.src = URL.createObjectURL(file);
    preview.classList.remove('hidden');
    document.getElementById('chartUploadLabel').classList.add('hidden');
}

function resetChartUpload() {
    selectedChartFile = null;
    var preview = document.getElementById('chartPreviewImage');
    preview.src = '';
    preview.classList.add('hidden');
    document.getElementById('chartUploadLabel').classList.remove('hidden');
    document.getElementById('chartFileInput').value = '';
}

async function analyzeChartUpload() {
    var limitWarning = document.getElementById('limitWarning');
    var user = localStorage.getItem('autocuan_user');

    if (user === 'guest') { alert('Login diperlukan untuk menggunakan fitur AI.'); return; }
    if (!selectedChartFile) { alert('Pilih screenshot chart terlebih dahulu.'); return; }
    if (!checkUsageLimit()) {
        limitWarning.textContent = 'Batas analisis tercapai (2x/30 menit). Tunggu beberapa menit.';
        limitWarning.classList.remove('hidden');
        logUsage('CHART_UPLOAD', 'ai_limit_blocked');
        return;
    }
    limitWarning.classList.add('hidden');

    logSearch('CHART_UPLOAD', 'chart_upload');
    logUsage('CHART_UPLOAD', 'ai_analysis_started');

    document.getElementById('loadingState').classList.remove('hidden');
    document.getElementById('resultSection').classList.add('hidden');
    document.getElementById('analyzeChartBtn').disabled = true;

    try {
        var base64Data = await fileToBase64(selectedChartFile);
        var response = await fetch('/api/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: base64Data, mimeType: selectedChartFile.type, source: 'chart_upload', username: localStorage.getItem('autocuan_user') || '', isAdmin: localStorage.getItem('autocuan_is_admin') === 'true' })
        });

        var data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Terjadi kesalahan pada server.');

        if (data.html) {
            var html = data.html;
            html = html.replace(/^```html\s*/i, '').replace(/```\s*$/i, '');
            document.getElementById('resultContent').innerHTML = html;
            document.getElementById('resultSection').classList.remove('hidden');
            document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
            addUsageRecord();
            logUsage('CHART_UPLOAD', 'ai_success');
            logAnalysisResult('CHART_UPLOAD', 'chart', html);
        } else {
            throw new Error('Tidak ada hasil analisis dari AI.');
        }
    } catch(error) {
        logUsage('CHART_UPLOAD', 'ai_error');
        document.getElementById('resultContent').innerHTML = '<div class="bg-red-500/10 border border-red-500/30 rounded-xl p-6 text-center"><p class="text-red-400 font-semibold mb-2">Gagal Menganalisis Chart</p><p class="text-red-300/70 text-sm">' + error.message + '</p><button onclick="analyzeChartUpload()" class="mt-4 px-4 py-2 rounded-lg bg-red-500/20 text-red-300 text-sm hover:bg-red-500/30 transition-colors">Coba Lagi</button></div>';
        document.getElementById('resultSection').classList.remove('hidden');
    } finally {
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('analyzeChartBtn').disabled = false;
    }
}

function fileToBase64(file) {
    return new Promise(function(resolve, reject) {
        var reader = new FileReader();
        reader.onload = function(e) { resolve(e.target.result); };
        reader.onerror = function(e) { reject(new Error('Gagal membaca file.')); };
        reader.readAsDataURL(file);
    });
}

var currentTab = 'ticker';
function switchTab(tab) {

// ============================================================
// ADMIN LOGS
// ============================================================

var lastAdminLogType = 'login';
var cachedAdminData = null;

async function loadAdminLogs(type) {
    lastAdminLogType = type;
    var container = document.getElementById('adminLogsContainer');
    container.innerHTML = '<div class="flex justify-center py-4"><div class="spinner"></div></div>';

    try {
        var adminName = localStorage.getItem('autocuan_user') || '';
        var response = await fetch('/api/admin-logs', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ adminName: adminName })
        });
        if (!response.ok) throw new Error('Fetch failed');
        var data = await response.json();
        cachedAdminData = data;

        if (!data.success) {
            container.innerHTML = '<p class="text-sm text-yellow-400">' + (data.error || 'Database logging belum dikonfigurasi.') + '</p>';
            return;
        }

        var summaryHtml = '<div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4">';
        summaryHtml += '<div class="bg-dark-700 rounded-lg p-3 text-center"><p class="text-xs text-gray-500">Total Logins</p><p class="text-lg font-bold text-emerald-400">' + (data.summary.totalLogins || 0) + '</p></div>';
        summaryHtml += '<div class="bg-dark-700 rounded-lg p-3 text-center"><p class="text-xs text-gray-500">Total Searches</p><p class="text-lg font-bold text-emerald-400">' + (data.summary.totalSearches || 0) + '</p></div>';
        summaryHtml += '<div class="bg-dark-700 rounded-lg p-3 text-center"><p class="text-xs text-gray-500">AI Analyses</p><p class="text-lg font-bold text-emerald-400">' + (data.summary.totalAIAnalyses || 0) + '</p></div>';
        summaryHtml += '<div class="bg-dark-700 rounded-lg p-3 text-center"><p class="text-xs text-gray-500">Top Ticker</p><p class="text-lg font-bold text-emerald-400">' + (data.summary.mostSearchedTicker || '-') + '</p></div>';
        summaryHtml += '</div>';

        var logs = [];
        if (type === 'login') logs = data.loginLogs || [];
        else if (type === 'search') logs = data.searchLogs || [];
        else if (type === 'analysis') logs = data.aiAnalysisLogs || [];
        else logs = data.aiUsageLogs || [];

        if (logs.length === 0) {
            container.innerHTML = summaryHtml + '<p class="text-sm text-gray-500">Belum ada data log.</p>';
            return;
        }

        if (type === 'analysis') {
            var cardsHtml = '<div class="space-y-3">';
            logs.forEach(function(row, idx) {
                var summary = row.result_summary || '';
                if (summary.length > 120) summary = summary.slice(0, 120) + '...';
                cardsHtml += '<div class="bg-[#0f1319] rounded-xl p-4 border border-[#1c2333]">';
                cardsHtml += '<div class="flex flex-wrap items-center gap-2 mb-2">';
                cardsHtml += '<span class="px-2 py-0.5 rounded text-xs font-bold bg-emerald-500/20 text-emerald-400">' + (row.ticker || '-') + '</span>';
                cardsHtml += '<span class="text-xs text-gray-500">' + (row.username || '-') + '</span>';
                cardsHtml += '<span class="text-xs text-gray-600">' + (row.mode || '-') + '</span>';
                cardsHtml += '<span class="text-xs text-gray-600 ml-auto">' + (row.created_at ? new Date(row.created_at).toLocaleString('id-ID') : '-') + '</span>';
                cardsHtml += '</div>';
                if (summary) cardsHtml += '<p class="text-xs text-gray-400 mb-3 line-clamp-2">' + summary + '</p>';
                cardsHtml += '<button onclick="openAdminAiDetail(' + idx + ')" class="px-3 py-1.5 rounded-lg text-xs font-semibold text-emerald-400 border border-emerald-500/30 hover:bg-emerald-500/10 transition-all">Lihat Hasil</button>';
                cardsHtml += '</div>';
            });
            cardsHtml += '</div>';
            container.innerHTML = summaryHtml + cardsHtml;
            return;
        }

        var excludeCols = ['full_result_html'];
        var keys = Object.keys(logs[0]).filter(function(k) { return excludeCols.indexOf(k) === -1; });
        var tableHtml = '<div class="overflow-x-auto"><table class="w-full text-sm border-collapse"><thead><tr>';
        keys.forEach(function(k) {
            tableHtml += '<th class="px-3 py-2 text-left text-emerald-400 font-medium border-b border-dark-600/50 bg-dark-700 whitespace-nowrap">' + k + '</th>';
        });
        tableHtml += '</tr></thead><tbody>';
        logs.forEach(function(row) {
            tableHtml += '<tr class="border-b border-dark-600/30 hover:bg-dark-700/30">';
            keys.forEach(function(k) {
                var val = row[k] || '-';
                if (typeof val === 'string' && val.length > 80) val = val.slice(0, 80) + '...';
                tableHtml += '<td class="px-3 py-2 text-gray-300 whitespace-nowrap">' + val + '</td>';
            });
            tableHtml += '</tr>';
        });
        tableHtml += '</tbody></table></div>';
        container.innerHTML = summaryHtml + tableHtml;
    } catch(e) {
        console.error('loadAdminLogs error:', e);
        container.innerHTML = '<p class="text-sm text-yellow-400">Database logging belum dikonfigurasi.</p>';
    }
}

function openAdminAiDetail(idx) {
    if (!cachedAdminData || !cachedAdminData.aiAnalysisLogs) return;
    var log = cachedAdminData.aiAnalysisLogs[idx];
    if (!log) return;
    var modal = document.getElementById('adminAiModal');
    var subtitle = document.getElementById('adminAiModalSubtitle');
    var detail = document.getElementById('adminAiResultDetail');
    subtitle.textContent = (log.ticker || 'N/A') + ' \u2022 ' + (log.username || 'N/A') + ' \u2022 ' + (log.created_at ? new Date(log.created_at).toLocaleString('id-ID') : '');
    if (log.full_result_html && log.full_result_html.length > 50) {
        detail.innerHTML = log.full_result_html;
    } else {
        detail.innerHTML = '<p class="text-sm text-yellow-400">Hasil lengkap tidak tersedia.</p>';
    }
    modal.classList.remove('hidden');
}

function closeAdminAiModal() {
    document.getElementById('adminAiModal').classList.add('hidden');
    document.getElementById('adminAiResultDetail').innerHTML = '';
}

// ============================================================
// RESPONSIVE TV HEIGHT
// ============================================================

function updateTvHeight() {
    var el = document.getElementById('tvChartContainer');
    if (el) { el.style.height = window.innerWidth < 640 ? '400px' : '500px'; }
}
window.addEventListener('resize', updateTvHeight);

// ============================================================
// APP INITIALIZATION
// ============================================================

function initApp() {
    console.log("[AutoCuan] initApp called");

    // Priority 1: Device blocked by username safety
    if (isDeviceBlocked()) {
        // Admin budi can still bypass via hidden admin modal
        showBlockedScreen();
        return;
    }

    // Priority 2: Maintenance time check
    if (isMaintenanceTime() && !isAdminUser()) {
        showMaintenanceScreen();
        return;
    }

    // Priority 3: Normal flow
    var user = localStorage.getItem('autocuan_user');
    if (user) {
        showDashboard(user);
    } else {
        showLoginScreen();
    }
}

// Run on page load
initApp();
</script>
</body>
</html>
