<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto-Cuan</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://s3.tradingview.com/tv.js"></script>
</head>
<body class="min-h-screen bg-[#0b0e14] text-gray-100 overflow-x-hidden">

<header class="w-full border-b border-gray-800 px-4 py-3">
<div class="flex items-center gap-3 w-full min-w-0">
<div class="w-11 h-11 shrink-0 rounded-xl bg-emerald-500 flex items-center justify-center text-black font-black text-lg">↗</div>
<div class="min-w-0">
<h1 class="text-xl font-black text-gray-100 truncate">Auto-Cuan</h1>
<p class="text-xs text-gray-400 truncate">AI Chart Reader</p>
</div>
</div>
</header>

<main class="w-full max-w-3xl mx-auto px-4 py-4 space-y-5">

<!-- Tabs -->
<div class="grid grid-cols-2 gap-2 w-full bg-[#111827] border border-gray-800 rounded-2xl p-2">
<button onclick="switchTab('chart')" id="tabChart" class="w-full py-3 rounded-xl text-xs font-bold text-center text-emerald-400 bg-emerald-500/10 border border-emerald-500/30">📊 Pindai</button>
<button onclick="switchTab('ticker')" id="tabTicker" class="w-full py-3 rounded-xl text-xs font-bold text-center text-gray-400 bg-transparent">🔍 Saham</button>
</div>

<!-- Tab 1: Pindai Chart -->
<section id="panelChart" class="w-full rounded-2xl border border-gray-800 bg-[#111827] p-4 space-y-4">
<p class="text-sm font-bold text-gray-100">Unggah Screenshot Chart</p>
<p class="text-xs text-gray-400">PNG, JPG, WebP • Maks 20MB</p>

<input id="fileInput" type="file" accept="image/*" class="hidden" onchange="onFile(event)">

<img id="previewImage" class="hidden w-full max-h-[240px] object-contain rounded-xl border border-gray-800">
<p id="previewName" class="hidden text-xs text-gray-400 truncate"></p>

<div class="flex flex-col gap-3 w-full">
<label for="fileInput" class="w-full px-4 py-3 rounded-xl bg-gray-800 text-gray-100 font-bold text-sm text-center cursor-pointer">📁 Pilih File</label>
<button onclick="clearFile()" id="resetBtn" class="hidden w-full px-4 py-3 rounded-xl bg-gray-800 text-red-400 font-bold text-sm text-center">✕ Hapus & Unggah Ulang</button>
<button onclick="doChart()" id="analyzeChartBtn" class="hidden w-full px-4 py-3 rounded-xl bg-emerald-500 text-black font-black text-sm text-center">⚡ Mulai Analisis Chart</button>
</div>
</section>

<!-- Tab 2: Nama Saham -->
<section id="panelTicker" class="hidden w-full rounded-2xl border border-gray-800 bg-[#111827] p-4 space-y-4">
<p class="text-sm font-bold text-gray-100">Ketik Kode Saham</p>
<p class="text-xs text-gray-400">Contoh: BBRI, BBCA, NAYZ, TLKM</p>
<input id="tickerInput" type="text" placeholder="BBRI" maxlength="10" class="w-full rounded-xl border border-gray-700 bg-[#0b0e14] px-4 py-3 text-gray-100 placeholder-gray-500 outline-none focus:border-emerald-500 text-sm font-bold uppercase">
<button onclick="doTicker()" class="w-full px-4 py-3 rounded-xl bg-emerald-500 text-black font-black text-sm text-center">🔍 Cari & Analisis Otomatis</button>
</section>

<!-- Loading -->
<div id="loading" class="hidden w-full rounded-xl border border-emerald-500/20 bg-emerald-500/10 p-4 text-sm text-emerald-300">
AI sedang menganalisis...
</div>

<!-- Result -->
<div id="analysis-output-container" class="w-full space-y-4 pb-8"></div>

<!-- TradingView -->
<section id="tradingview-section" class="hidden w-full rounded-2xl border border-gray-800 bg-[#111827] p-4 space-y-3">
<div class="flex flex-col gap-1">
<h2 class="text-lg font-black text-gray-100">📈 Chart Live TradingView</h2>
<p id="tv-symbol-label" class="text-xs text-emerald-400 font-bold">IDX:BBRI</p>
</div>
<div class="w-full overflow-hidden rounded-xl border border-gray-800 bg-[#0b0e14]">
<div id="tv-container"><div id="tradingview-widget" class="w-full h-[340px]"></div></div>
</div>
</section>

<!-- Error -->
<div id="errorBox" class="hidden w-full rounded-xl border border-red-500/30 bg-red-500/10 p-4 text-sm text-red-300">
<p id="errorMsg"></p>
<button onclick="retry()" class="mt-3 w-full px-4 py-2 rounded-xl bg-red-500/20 text-red-300 font-bold text-xs text-center">Coba Lagi</button>
</div>

</main>

<footer class="w-full border-t border-gray-800 px-4 py-4 text-center">
<p class="text-[10px] text-gray-600">Auto-Cuan © 2025 • Bukan saran investasi.</p>
</footer>

<script>
let imgB64=null, imgMime=null, lastMode='chart';

function switchTab(t){
  document.getElementById('panelChart').classList.toggle('hidden',t!=='chart');
  document.getElementById('panelTicker').classList.toggle('hidden',t!=='ticker');
  if(t==='chart') document.getElementById('tradingview-section').classList.add('hidden');
  document.getElementById('tabChart').className='w-full py-3 rounded-xl text-xs font-bold text-center '+(t==='chart'?'text-emerald-400 bg-emerald-500/10 border border-emerald-500/30':'text-gray-400 bg-transparent');
  document.getElementById('tabTicker').className='w-full py-3 rounded-xl text-xs font-bold text-center '+(t==='ticker'?'text-emerald-400 bg-emerald-500/10 border border-emerald-500/30':'text-gray-400 bg-transparent');
}

function onFile(e){
  const f=e.target.files[0];
  if(!f)return;
  if(f.size>20*1024*1024){alert('Maks 20MB');return;}
  imgMime=f.type;
  const r=new FileReader();
  r.onload=function(ev){
    imgB64=ev.target.result;
    document.getElementById('previewImage').src=imgB64;
    document.getElementById('previewImage').classList.remove('hidden');
    document.getElementById('previewName').textContent=f.name;
    document.getElementById('previewName').classList.remove('hidden');
    document.getElementById('resetBtn').classList.remove('hidden');
    document.getElementById('analyzeChartBtn').classList.remove('hidden');
  };
  r.readAsDataURL(f);
}

function clearFile(){
  imgB64=null;imgMime=null;
  document.getElementById('fileInput').value='';
  document.getElementById('previewImage').classList.add('hidden');
  document.getElementById('previewName').classList.add('hidden');
  document.getElementById('resetBtn').classList.add('hidden');
  document.getElementById('analyzeChartBtn').classList.add('hidden');
  document.getElementById('analysis-output-container').innerHTML='';
}

function doChart(){
  if(!imgB64)return;
  lastMode='chart';
  document.getElementById('tradingview-section').classList.add('hidden');
  runAI({image:imgB64,mimeType:imgMime});
}

function doTicker(){
  var t=document.getElementById('tickerInput').value.trim().toUpperCase();
  if(!t){alert('Masukkan kode saham');return;}
  lastMode='ticker';
  runAI({ticker:t});
}

function retry(){lastMode==='chart'?doChart():doTicker();}

function runAI(body){
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('errorBox').classList.add('hidden');
  document.getElementById('analysis-output-container').innerHTML='';
  document.getElementById('tradingview-section').classList.add('hidden');

  fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
  .then(function(res){
    if(!res.ok){
      return res.json().then(function(d){throw new Error(d.error||'Error '+res.status);});
    }
    return res.text();
  })
  .then(function(html){
    document.getElementById('loading').classList.add('hidden');
    if(!html||!html.trim()){throw new Error('Respons kosong');}
    html=html.replace(/^```html?\s*\n?/i,'').replace(/\n?```\s*$/i,'');
    document.getElementById('analysis-output-container').innerHTML=html;
    if(lastMode==='ticker'&&body.ticker){
      loadTV(body.ticker);
    }
  })
  .catch(function(err){
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('errorMsg').textContent=err.message;
    document.getElementById('errorBox').classList.remove('hidden');
  });
}

function loadTV(ticker){
  ticker=(ticker||'BBRI').toUpperCase().replace(/[^A-Z0-9]/g,'');
  var symbol='IDX:'+ticker;
  document.getElementById('tv-symbol-label').textContent=symbol;
  document.getElementById('tradingview-section').classList.remove('hidden');
  var c=document.getElementById('tv-container');
  c.innerHTML='<div id="tradingview-widget" class="w-full h-[340px]"></div>';
  new TradingView.widget({
    autosize:true,
    symbol:symbol,
    interval:'D',
    timezone:'Asia/Jakarta',
    theme:'dark',
    style:'1',
    locale:'id',
    toolbar_bg:'#0b0e14',
    enable_publishing:false,
    hide_top_toolbar:false,
    hide_side_toolbar:true,
    allow_symbol_change:true,
    container_id:'tradingview-widget'
  });
}
</script>
</body>
</html>
