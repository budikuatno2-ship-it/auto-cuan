<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Cuan | AI Chart Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{dark:{900:'#0b0e14',800:'#0f1319',700:'#151a23',600:'#1c2333',500:'#242d3d'}}}}}</script>
    <style>
        body{background:#0b0e14;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif}
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#242d3d;border-radius:3px}
        .glow-emerald{box-shadow:0 0 15px rgba(16,185,129,.3)}
        .upload-zone{border:2px dashed #242d3d;transition:all .3s}.upload-zone:hover,.upload-zone.dragover{border-color:#10b981;background:rgba(16,185,129,.03)}
        @keyframes spin{to{transform:rotate(360deg)}}.spinner{width:36px;height:36px;border:3px solid #242d3d;border-top-color:#10b981;border-radius:50%;animation:spin .8s linear infinite}
        @keyframes pulse-glow{0%,100%{opacity:1}50%{opacity:.5}}.animate-pulse-glow{animation:pulse-glow 2s ease-in-out infinite}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.fade-in{animation:fadeIn .4s ease forwards}
        .tab-active{border-bottom:2px solid #10b981;color:#10b981}.tab-inactive{border-bottom:2px solid transparent;color:#6b7280}
        .news-card{border-left:3px solid #242d3d;transition:all .2s}.news-card:hover{border-left-color:#10b981;background:rgba(16,185,129,.03)}
    </style>
</head>
<body class="min-h-screen text-gray-100">
    <header class="sticky top-0 z-50 backdrop-blur-xl bg-dark-900/80 border-b border-dark-600/50">
        <div class="max-w-4xl mx-auto px-4 py-3 flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-emerald-500 to-emerald-600 flex items-center justify-center">
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
            </div>
            <div>
                <h1 class="text-base font-bold text-white">Auto-Cuan</h1>
                <p class="text-[10px] text-gray-500">AI Chart Reader &bull; Smart Money Concepts</p>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-3 sm:px-6 py-5 space-y-5">
        <!-- Tabs -->
        <div class="flex border-b border-dark-600">
            <button onclick="switchTab('chart')" id="tabChart" class="flex-1 py-3 text-center text-xs sm:text-sm font-semibold tab-active transition-colors">&#128202; Pindai Chart</button>
            <button onclick="switchTab('ticker')" id="tabTicker" class="flex-1 py-3 text-center text-xs sm:text-sm font-semibold tab-inactive transition-colors">&#128269; Nama Saham</button>
        </div>

        <!-- Tab 1: Chart Upload -->
        <section id="panelChart">
            <div id="uploadZone" class="upload-zone rounded-xl p-4 sm:p-8 text-center cursor-pointer bg-dark-800/50" onclick="document.getElementById('fileInput').click()">
                <div id="uploadPrompt">
                    <div class="w-12 h-12 mx-auto mb-3 rounded-lg bg-dark-700 flex items-center justify-center">
                        <svg class="w-6 h-6 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                    </div>
                    <p class="text-sm font-semibold text-gray-200">Unggah Screenshot Chart</p>
                    <p class="text-[10px] text-gray-500 mt-1">PNG, JPG, WebP &bull; Maks 20MB</p>
                </div>
                <div id="previewContainer" class="hidden">
                    <img id="imagePreview" class="max-h-[250px] sm:max-h-[350px] mx-auto rounded-lg border border-dark-600/50" alt="">
                    <p id="fileName" class="mt-2 text-[10px] text-gray-400"></p>
                </div>
            </div>
            <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp" class="hidden" onchange="handleFile(event)">
            <div id="chartBtns" class="flex flex-col sm:flex-row gap-2 mt-3 w-full hidden">
                <button onclick="resetUpload()" class="w-full sm:w-auto px-4 py-2 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-xs font-medium">&#10005; Hapus</button>
                <button onclick="analyzeChart()" class="w-full sm:flex-1 px-4 py-2.5 rounded-lg font-bold text-white bg-gradient-to-r from-emerald-600 to-emerald-500 glow-emerald text-sm">&#9889; Mulai Analisis Chart</button>
            </div>
        </section>

        <!-- Tab 2: Ticker Search -->
        <section id="panelTicker" class="hidden">
            <div class="bg-dark-800/50 rounded-xl p-4 sm:p-6 border border-dark-600/50">
                <label class="block text-xs text-gray-400 mb-2 font-medium">Ketik Kode Saham (Contoh: BBRI, NAYZ):</label>
                <input id="tickerInput" type="text" placeholder="BBRI" maxlength="10" class="w-full px-4 py-3 rounded-lg bg-dark-700 border border-dark-600 text-white text-sm font-bold uppercase placeholder-gray-600 focus:border-emerald-500 focus:outline-none">
            </div>
            <button onclick="analyzeTicker()" class="w-full mt-3 px-4 py-2.5 rounded-lg font-bold text-white bg-gradient-to-r from-emerald-600 to-emerald-500 glow-emerald text-sm">&#128269; Cari &amp; Analisis Otomatis</button>
        </section>

        <!-- Loading -->
        <section id="loadingState" class="hidden">
            <div class="bg-dark-800/60 rounded-xl border border-dark-600/50 p-6 text-center">
                <div class="spinner mx-auto mb-3"></div>
                <p class="text-emerald-400 text-xs font-medium animate-pulse-glow">&#128260; AI sedang menganalisis...</p>
            </div>
        </section>

        <!-- Results -->
        <section id="resultSection" class="hidden fade-in">
            <div class="bg-dark-800/60 rounded-xl border border-dark-600/50 overflow-hidden">
                <div class="px-4 py-3 border-b border-dark-600/50 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                    <h2 class="text-xs font-semibold text-gray-200">Hasil Analisis</h2>
                </div>
                <div id="resultContainer" class="p-4 overflow-x-auto"></div>
            </div>
        </section>

        <!-- Error -->
        <section id="errorSection" class="hidden fade-in">
            <div class="bg-red-500/10 border border-red-500/30 rounded-xl p-4 text-center">
                <p class="text-red-400 font-semibold text-xs mb-1">&#9888; Gagal</p>
                <p id="errorText" class="text-red-300/70 text-[10px] mb-2"></p>
                <button onclick="retryLast()" class="px-3 py-1.5 rounded bg-red-500/20 text-red-300 text-[10px] font-medium">Coba Lagi</button>
            </div>
        </section>

        <!-- News Section (frontend-only, no Gemini quota) -->
        <section id="newsSection" class="hidden fade-in">
            <div class="bg-dark-800/60 rounded-xl border border-dark-600/50 overflow-hidden">
                <div class="px-4 py-3 border-b border-dark-600/50 flex items-center gap-2">
                    <span class="text-sm">&#128240;</span>
                    <h2 class="text-xs font-semibold text-gray-200">Berita Terkini Emiten &amp; Aksi Korporasi (Yahoo Finance)</h2>
                </div>
                <div id="newsContent" class="p-3 space-y-1 max-h-[350px] overflow-y-auto"></div>
            </div>
        </section>
    </main>

    <footer class="border-t border-dark-700/50 mt-8">
        <div class="max-w-4xl mx-auto px-4 py-4 text-center">
            <p class="text-[10px] text-gray-600">Auto-Cuan &copy; 2025 &bull; Smart Money Concepts IDX</p>
            <p class="text-[10px] text-gray-700">Disclaimer: Bukan saran investasi.</p>
        </div>
    </footer>

    <script>
    let imageBase64=null,imageMimeType=null,lastMode='chart';
    const $=id=>document.getElementById(id);
    const uploadZone=$('uploadZone');

    // Tabs
    function switchTab(t){
        $('panelChart').classList.toggle('hidden',t!=='chart');
        $('panelTicker').classList.toggle('hidden',t!=='ticker');
        $('tabChart').className='flex-1 py-3 text-center text-xs sm:text-sm font-semibold transition-colors '+(t==='chart'?'tab-active':'tab-inactive');
        $('tabTicker').className='flex-1 py-3 text-center text-xs sm:text-sm font-semibold transition-colors '+(t==='ticker'?'tab-active':'tab-inactive');
    }

    // Drag & Drop
    ['dragenter','dragover','dragleave','drop'].forEach(ev=>uploadZone.addEventListener(ev,e=>{e.preventDefault();e.stopPropagation()}));
    ['dragenter','dragover'].forEach(ev=>uploadZone.addEventListener(ev,()=>uploadZone.classList.add('dragover')));
    ['dragleave','drop'].forEach(ev=>uploadZone.addEventListener(ev,()=>uploadZone.classList.remove('dragover')));
    uploadZone.addEventListener('drop',e=>{if(e.dataTransfer.files.length)processFile(e.dataTransfer.files[0])});

    function handleFile(e){if(e.target.files[0])processFile(e.target.files[0])}
    function processFile(file){
        if(!['image/png','image/jpeg','image/webp'].includes(file.type)){alert('Format tidak didukung.');return}
        if(file.size>20*1024*1024){alert('Maks 20MB.');return}
        imageMimeType=file.type;
        const r=new FileReader();
        r.onload=e=>{
            imageBase64=e.target.result;
            $('imagePreview').src=imageBase64;
            $('fileName').textContent=file.name+' ('+(file.size/1024/1024).toFixed(1)+' MB)';
            $('uploadPrompt').classList.add('hidden');
            $('previewContainer').classList.remove('hidden');
            $('chartBtns').classList.remove('hidden');
        };
        r.readAsDataURL(file);
    }
    function resetUpload(){
        imageBase64=null;imageMimeType=null;$('fileInput').value='';
        $('uploadPrompt').classList.remove('hidden');
        $('previewContainer').classList.add('hidden');
        $('chartBtns').classList.add('hidden');
        hideResults();
    }
    function hideResults(){['resultSection','errorSection','newsSection'].forEach(id=>$(id).classList.add('hidden'))}

    // Analyze Chart
    async function analyzeChart(){
        if(!imageBase64)return;
        lastMode='chart';
        await runAnalysis({image:imageBase64,mimeType:imageMimeType});
    }
    // Analyze Ticker
    async function analyzeTicker(){
        const t=$('tickerInput').value.trim().toUpperCase();
        if(!t){alert('Masukkan kode saham.');return}
        lastMode='ticker';
        await runAnalysis({ticker:t});
    }
    function retryLast(){lastMode==='chart'?analyzeChart():analyzeTicker()}

    async function runAnalysis(body){
        $('loadingState').classList.remove('hidden');
        hideResults();
        try{
            const res=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
            if(!res.ok){const d=await res.json().catch(()=>({}));throw new Error(d.error||'Error '+res.status)}
            const html=await res.text();
            $('loadingState').classList.add('hidden');
            if(!html.trim())throw new Error('Respons kosong.');
            let cleaned=html.replace(/^```html?\s*\n?/i,'').replace(/\n?```\s*$/i,'');
            $('resultContainer').innerHTML=cleaned;
            $('resultSection').classList.remove('hidden');
            setTimeout(()=>$('resultSection').scrollIntoView({behavior:'smooth',block:'start'}),80);
            // Load news (free, no Gemini)
            const ticker=body.ticker||(cleaned.match(/([A-Z]{4})/)||[])[1]||'';
            if(ticker)loadNews(ticker);
        }catch(err){
            $('loadingState').classList.add('hidden');
            $('errorText').textContent=err.message;
            $('errorSection').classList.remove('hidden');
        }
    }

    // Free News Feed (RSS-to-JSON, no Gemini quota)
    async function loadNews(ticker){
        try{
            const res=await fetch('/api/news?ticker='+encodeURIComponent(ticker));
            if(!res.ok)return;
            const data=await res.json();
            if(data.news&&data.news.length>0){
                $('newsContent').innerHTML=data.news.map(n=>'<a href="'+esc(n.link)+'" target="_blank" rel="noopener" class="news-card block p-3 rounded-lg"><p class="text-xs text-gray-200 font-medium">'+esc(n.title)+'</p><p class="text-[10px] text-gray-500 mt-1">'+esc(n.pubDate)+'</p></a>').join('');
                $('newsSection').classList.remove('hidden');
            }
        }catch(e){console.log('News skipped:',e.message)}
    }
    function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
    </script>
</body>
</html>
